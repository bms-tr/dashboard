services:
  - type: web
    name: bms-dashboard
    env: python
    plan: free
    region: frankfurt
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true

    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6

      # --- Autenticación ---
      - key: AUTH_USER
        sync: false
      - key: AUTH_PASSWORD
        sync: false

      # --- Supabase ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: bms_dashboard
``